version: '3.9'

services:
  api:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: drone-delivery-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=drone-delivery-production-secret-2026
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        - VITE_API_URL=http://localhost:3001/api
    container_name: drone-delivery-admin
    ports:
      - "3000:80"
    volumes:
      - ./apps/admin/dist:/usr/share/nginx/html:ro
      - ./docker/nginx-admin.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  merchant:
    build:
      context: .
      dockerfile: Dockerfile.merchant
      args:
        - VITE_API_URL=http://localhost:3001/api
    container_name: drone-delivery-merchant
    ports:
      - "5173:80"
    volumes:
      - ./apps/merchant/dist:/usr/share/nginx/html:ro
      - ./docker/nginx-merchant.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

networks:
  default:
    name: drone-delivery-network
